apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-deployment-app
  template:
    metadata:
      labels:
        app: test-deployment-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"          
        prometheus.io/path: "/metrics"      
    spec:
      containers:
      - name: scalepod
        image: testapp:latest
        imagePullPolicy: Never 
        ports: 
        - containerPort: 8080
        resources:
          requests:
            memory: "30Mi"
            cpu: "100m"
