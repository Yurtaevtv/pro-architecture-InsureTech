# hpa-custom-metrics.yaml - Horizontal Pod Autoscaler на основе кастомных метрик
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: reviews-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: test-deployment
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Pods
    pods:
      metric:
        name: metrics_requests_total 
      target:
        type: AverageValue
        averageValue: 15  